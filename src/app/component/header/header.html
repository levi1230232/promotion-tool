<mat-toolbar color="primary" class="header-toolbar">
  <button mat-icon-button (click)="toggleSidebar.emit()">
    <mat-icon>menu</mat-icon>
  </button>
  <div class="logo">
    <span>{{ (title ? title.toLocaleUpperCase() : 'HOME') | translate }}</span>
  </div>

  <span class="spacer"></span>

  <button mat-button [matMenuTriggerFor]="langMenu" class="lang-btn">
    <mat-icon>language</mat-icon>
    {{ currentLang.toUpperCase() || 'EN' }}
  </button>

  <mat-menu #langMenu="matMenu">
    <button mat-menu-item (click)="changeLanguage('en')">en English</button>

    <button mat-menu-item (click)="changeLanguage('vi')">vi Tiếng Việt</button>
  </mat-menu>

  <button mat-icon-button [matMenuTriggerFor]="settingsMenu">
    <mat-icon>settings</mat-icon>
  </button>

  <mat-menu #settingsMenu="matMenu">
    <button mat-menu-item>
      <mat-icon>person</mat-icon>
      <span>{{ 'PROFILE' | translate }}</span>
    </button>

    <button mat-menu-item>
      <mat-icon>lock</mat-icon>
      <span>{{ 'CHANGE_PASSWORD' | translate }}</span>
    </button>
  </mat-menu>

  <button mat-stroked-button color="warn" (click)="logout()" class="logout-btn">
    <mat-icon>logout</mat-icon>
    {{ 'LOGOUT' | translate }}
  </button>
</mat-toolbar>
